{% extends "layouts/base.html" %}
{% load custom_filters %}
{% load static %}

{% block content %}
    {% include 'dashboard/brigades/_brigade_work_total.html' %}
{% endblock %}
{% block extrascript %}
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.2.2/css/dataTables.dataTables.min.css">
    <script src="https://cdn.datatables.net/2.2.2/js/dataTables.min.js"></script>
    <script>

        let table1 = new DataTable('#brigade_actions_table', {
            sorting: false,
            searching: false,
            columnDefs: [
                {"orderable": false, "targets": "_all"}
            ],
            lengthMenu: [
                [60, 120, 180, -1],
                [60, 120, 180, 'все записи']
            ],
            paging: false,
            language: {
                info: ' ',
                infoEmpty: 'Нет записей',
                infoFiltered: '(filtered from _MAX_ total records)',
                lengthMenu: 'Показать _MENU_ на странице',
                zeroRecords: 'Nothing found - sorry'
            },
            stateSave: true,
        });
    </script>

    <script>
        $(function () {
            $("#id_name").autocomplete({
                source: "{% url 'get_locations' %}",
                minLength: 2,
                select: function (event, ui) {
                    $("#id_name").val(ui.item.value);
                    return false;
                }
            });
        });
    </script>
{% endblock extrascript %}
